apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-workflows-metrics
  namespace: cnconti
  labels:
    app: argo-workflows-metrics
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: argo-workflows-metrics
  template:
    metadata:
      labels:
        app: argo-workflows-metrics
    spec:
      serviceAccountName: argo-workflows-metrics
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: argo-workflows-metrics
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: argo-workflows-metrics
      containers:
      - name: exporter
        image: argo-workflows-metrics:latest
        imagePullPolicy: IfNotPresent
        args:
        - -v=2
        - -namespace=
        - -port=8080
        - -resync-period=5m
        - -enable-pod-container-metrics=false
        - -worker-count=1
        - -full-reconcile-period=10m
        - -leader-elect=true
        - -leader-election-id=argo-workflows-metrics
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
