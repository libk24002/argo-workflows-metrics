apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argo-workflows-metrics
  namespace: cnconti
  labels:
    app: argo-workflows-metrics
spec:
  groups:
  - name: argo-workflows-metrics-recording
    rules:
    - record: argo:workflow:active_total
      expr: sum(argo_workflow_count)
    - record: argo:workflow:running_by_namespace
      expr: sum by (namespace) (argo_workflow_status_total{phase="Running"})
    - record: argo:workflow:pending_by_namespace
      expr: sum by (namespace) (argo_workflow_status_total{phase="Pending"})
    - record: argo:workflow:failed_ratio_by_namespace
      expr: |
        (
          sum by (namespace) (argo_workflow_status_total{phase=~"Failed|Error"})
          /
          clamp_min(sum by (namespace) (argo_workflow_count), 1)
        )
    - record: argo:workflow:duration_p95_seconds_by_namespace
      expr: quantile by (namespace) (0.95, argo_workflow_duration_seconds)
    - record: argo:exporter:event_rate_5m
      expr: sum by (informer, event) (rate(argo_exporter_events_total[5m]))
    - record: argo:exporter:event_handler_error_rate_5m
      expr: sum by (informer, event) (rate(argo_exporter_event_handler_errors_total[5m]))
  - name: argo-workflows-metrics-admin
    rules:
    - record: argo:workflow:total_by_phase
      expr: sum by (phase) (argo_workflow_status_total)
    - record: argo:workflow:pending_backlog_cluster
      expr: sum(argo_workflow_status_total{phase="Pending"})
    - record: argo:workflow:failure_ratio_cluster
      expr: |
        (
          sum(argo_workflow_status_total{phase=~"Failed|Error"})
          /
          clamp_min(sum(argo_workflow_count), 1)
        )
    - record: argo:workflow:duration_p95_seconds_cluster
      expr: quantile(0.95, argo_workflow_duration_seconds)
    - alert: ArgoWorkflowFailureRatioHigh
      expr: argo:workflow:failure_ratio_cluster > 0.20 and argo:workflow:active_total > 20
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: argo workflow failure ratio is high
        description: Cluster workflow failure ratio is above 20 percent for more than 10 minutes.
    - alert: ArgoWorkflowPendingBacklogHigh
      expr: argo:workflow:pending_backlog_cluster > 100
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: argo workflow pending backlog is high
        description: Cluster has over 100 pending workflows for more than 15 minutes.
    - alert: ArgoWorkflowDurationP95High
      expr: argo:workflow:duration_p95_seconds_cluster > 3600 and argo:workflow:active_total > 20
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: argo workflow p95 duration is high
        description: Cluster workflow p95 duration is above one hour for more than 15 minutes.
  - name: argo-workflows-metrics-exporter
    rules:
    - alert: ArgoExporterNotReady
      expr: argo_exporter_ready == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: argo-workflows-metrics exporter is not ready
        description: Exporter readiness has been 0 for more than 5 minutes.
    - alert: ArgoExporterUnhealthy
      expr: argo_exporter_alive == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: argo-workflows-metrics exporter is unhealthy
        description: Exporter liveness has been 0 for more than 1 minute.
    - alert: ArgoExporterInformerUnsynced
      expr: argo_exporter_informer_synced == 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: argo-workflows-metrics informer is not synced
        description: Informer {{ $labels.informer }} has not synced for over 10 minutes.
    - alert: ArgoExporterNoRecentEvents
      expr: (time() - argo_exporter_last_event_timestamp_seconds > 3600) and (argo_exporter_last_event_timestamp_seconds > 0)
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: argo-workflows-metrics has no recent events
        description: Informer {{ $labels.informer }} has not received events for over one hour.
    - alert: ArgoExporterEventHandlerErrors
      expr: increase(argo_exporter_event_handler_errors_total[15m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: argo-workflows-metrics event handler errors detected
        description: Event handler errors were observed in the last 15 minutes.
